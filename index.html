<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Área de Membros · Entre no Forró</title>
  <meta name="description" content="Área de membros do curso Entre no Forró — Forró Sem Parede. Acesse os módulos, aulas e bônus." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    ::selection { background: #000; color: #FF4D00; }

    :root {
      --orange: #FF4D00;
      --black: #000000;
      --white: #FFFFFF;
      --ink: #0d0d0d;
      --muted: rgba(255,255,255,0.55);
      --line: rgba(255,255,255,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    img { display: block; }
    button { font-family: inherit; cursor: pointer; border: none; }
    a { color: inherit; }

    /* ── BANDEIRINHAS ─────────────────────────────────────── */
    .bunting {
      display: flex;
      justify-content: center;
      overflow: hidden;
      height: 24px;
      line-height: 0;
    }
    .bunting i {
      width: 36px;
      height: 22px;
      flex: 0 0 auto;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
    }
    .bunting i:nth-child(5n+1) { background: #E63946; }
    .bunting i:nth-child(5n+2) { background: #FFD23F; }
    .bunting i:nth-child(5n+3) { background: #2A9D8F; }
    .bunting i:nth-child(5n+4) { background: #3A86FF; }
    .bunting i:nth-child(5n+5) { background: #F72585; }

    .mono {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }
    .display {
      font-family: 'Archivo Black', sans-serif;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 0.92;
    }

    /* ═══════════════════════════════════════════════════════
       APP SHELL
    ═══════════════════════════════════════════════════════ */
    .app { display: none; min-height: 100vh; flex-direction: column; }
    .app.active { display: flex; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--black);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
    }
    .topbar-logo { height: 36px; cursor: pointer; }
    .topbar-right { display: flex; align-items: center; gap: 18px; }
    .topbar-progress { display: flex; align-items: center; gap: 12px; }
    .topbar-progress-bar {
      width: 120px;
      height: 7px;
      background: rgba(255,255,255,0.12);
      border-radius: 9999px;
      overflow: hidden;
    }
    .topbar-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--orange);
      border-radius: 9999px;
      transition: width 0.5s ease;
    }
    .topbar-progress-label { font-size: 10px; color: var(--muted); }
    .main { flex: 1; max-width: 1200px; width: 100%; margin: 0 auto; padding: 0 24px 80px; }

    .view { display: none; }
    .view.active { display: block; animation: fade 0.35s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* ── DASHBOARD HERO ──────────────────────────────────── */
    .dash-hero {
      background: var(--orange);
      color: var(--black);
      border-radius: 0 0 28px 28px;
      margin: 0 -24px 40px;
      padding: 44px 40px 40px;
    }
    .dash-hero-inner { max-width: 1152px; margin: 0 auto; }
    .dash-eyebrow {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .dash-greeting {
      font-family: 'Archivo Black', sans-serif;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 0.9;
      font-size: clamp(30px, 5vw, 58px);
      margin-bottom: 22px;
    }
    .dash-stats { display: flex; flex-wrap: wrap; gap: 14px; }
    .dash-stat {
      background: var(--black);
      color: var(--white);
      border-radius: 14px;
      padding: 16px 22px;
      min-width: 130px;
    }
    .dash-stat-num { font-family: 'Archivo Black', sans-serif; font-size: 30px; letter-spacing: -0.04em; line-height: 1; }
    .dash-stat-num .orange { color: var(--orange); }
    .dash-stat-label {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--muted);
      margin-top: 8px;
    }

    /* ── CONTINUE CARD ───────────────────────────────────── */
    .continue {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 0;
      background: var(--black);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 48px;
    }
    .continue-img { width: 100%; height: 100%; min-height: 170px; object-fit: cover; }
    .continue-body { padding: 28px 30px; display: flex; flex-direction: column; justify-content: center; }
    .continue-tag {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--orange);
      margin-bottom: 10px;
    }
    .continue-title {
      font-family: 'Archivo Black', sans-serif;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      font-size: 26px;
      line-height: 1;
      margin-bottom: 6px;
    }
    .continue-meta { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .btn-primary {
      align-self: flex-start;
      background: var(--orange);
      color: var(--black);
      font-family: 'Archivo Black', sans-serif;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      font-size: 14px;
      padding: 13px 26px;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(255,77,0,0.28); }

    /* ── SECTION HEADERS ─────────────────────────────────── */
    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 28px;
    }
    .section-head h2 {
      font-family: 'Archivo Black', sans-serif;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      font-size: clamp(22px, 3vw, 36px);
      line-height: 0.95;
    }
    .section-head .count {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: var(--muted);
    }

    /* ── MODULE GRID ─────────────────────────────────────── */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      margin-bottom: 56px;
    }
    .module-card {
      background: var(--black);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      text-align: left;
      transition: transform 0.25s, border-color 0.25s;
      display: flex;
      flex-direction: column;
    }
    .module-card:hover { transform: translateY(-5px); border-color: var(--orange); }
    .module-thumb-wrap { position: relative; aspect-ratio: 16 / 10; overflow: hidden; }
    .module-thumb { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
    .module-card:hover .module-thumb { transform: scale(1.05); }
    .module-thumb-wrap::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0) 55%);
    }
    .module-index {
      position: absolute; top: 12px; left: 12px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 11px;
      color: var(--black);
      background: var(--orange);
      padding: 5px 11px;
      border-radius: 9999px;
      z-index: 2;
    }
    .module-done-badge {
      position: absolute; top: 12px; right: 12px;
      width: 26px; height: 26px;
      background: var(--orange);
      color: var(--black);
      border-radius: 50%;
      display: none;
      align-items: center; justify-content: center;
      z-index: 2;
    }
    .module-card.complete .module-done-badge { display: flex; }
    .module-body { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; }
    .module-title {
      font-family: 'Archivo Black', sans-serif;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      font-size: 21px;
      line-height: 1;
      margin-bottom: 6px;
    }
    .module-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 16px; flex: 1; }
    .module-foot { display: flex; align-items: center; justify-content: space-between; }
    .module-lessons-count {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: var(--muted);
    }
    .module-bar { height: 5px; background: rgba(255,255,255,0.1); border-radius: 9999px; overflow: hidden; margin-top: 14px; }
    .module-bar-fill { height: 100%; width: 0%; background: var(--orange); border-radius: 9999px; transition: width 0.5s; }
    .module-arrow { color: var(--orange); }

    /* ── BONUS GRID ──────────────────────────────────────── */
    .bonus-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .bonus-card {
      background: var(--black);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 22px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: border-color 0.25s, transform 0.25s;
    }
    .bonus-card:hover { border-color: var(--orange); transform: translateY(-3px); }
    .bonus-icon {
      flex-shrink: 0;
      width: 42px; height: 42px;
      border-radius: 11px;
      background: rgba(255,77,0,0.12);
      color: var(--orange);
      display: flex; align-items: center; justify-content: center;
    }
    .bonus-info h3 { font-size: 15px; font-weight: 600; line-height: 1.3; margin-bottom: 5px; }
    .bonus-info p { font-size: 12.5px; color: var(--muted); line-height: 1.5; }
    .bonus-pill {
      display: inline-block;
      margin-top: 10px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--orange);
      border: 1px solid rgba(255,77,0,0.35);
      padding: 3px 9px;
      border-radius: 9999px;
    }
    .bonus-card { text-align: left; cursor: pointer; }

    /* ── BONUS DETAIL ────────────────────────────────────── */
    .bonus-detail { max-width: 820px; margin: 0 auto; }
    .bd-head { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; }
    .bd-icon {
      flex-shrink: 0; width: 54px; height: 54px; border-radius: 14px;
      background: rgba(255,77,0,0.12); color: var(--orange);
      display: flex; align-items: center; justify-content: center;
    }
    .bd-tag {
      font-family: 'Space Mono', monospace; font-weight: 700; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.02em; color: var(--orange);
    }
    .bd-title {
      font-family: 'Archivo Black', sans-serif; text-transform: uppercase;
      letter-spacing: -0.04em; line-height: 0.95; font-size: clamp(26px, 4vw, 44px);
    }
    .bd-intro { font-size: 16px; line-height: 1.7; color: rgba(255,255,255,0.7); margin: 18px 0 30px; }
    .bd-section { margin-bottom: 26px; }
    .bd-section h3 {
      font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px;
      text-transform: uppercase; letter-spacing: -0.02em; color: var(--white);
      padding-bottom: 10px; border-bottom: 1px solid var(--line); margin-bottom: 14px;
    }
    .bd-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .bd-list li { display: flex; gap: 12px; font-size: 15px; line-height: 1.55; color: rgba(255,255,255,0.85); }
    .bd-list li svg { flex-shrink: 0; color: var(--orange); margin-top: 3px; }

    /* checklist */
    .bd-check { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .bd-check li {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      background: var(--black); border: 1px solid var(--line); border-radius: 12px;
      cursor: pointer; transition: border-color 0.2s; font-size: 15px; color: rgba(255,255,255,0.9);
    }
    .bd-check li:hover { border-color: var(--orange); }
    .bd-check li .ck {
      flex-shrink: 0; width: 24px; height: 24px; border-radius: 7px;
      border: 2px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; color: transparent;
    }
    .bd-check li.on .ck { background: var(--orange); border-color: var(--orange); color: var(--black); }
    .bd-check li.on { color: rgba(255,255,255,0.5); text-decoration: line-through; }

    /* playlist / lista de músicas e links */
    .bd-rows { display: flex; flex-direction: column; gap: 8px; }
    .bd-row {
      display: flex; align-items: center; gap: 14px; padding: 13px 16px;
      background: var(--black); border: 1px solid var(--line); border-radius: 12px;
      text-decoration: none; transition: border-color 0.2s, transform 0.2s;
    }
    .bd-row:hover { border-color: var(--orange); transform: translateY(-2px); }
    .bd-row-num { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 12px; color: var(--orange); min-width: 22px; }
    .bd-row-main { flex: 1; min-width: 0; }
    .bd-row-title { font-size: 15px; font-weight: 600; color: var(--white); }
    .bd-row-sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
    .bd-row-go { color: var(--muted); flex-shrink: 0; }
    .bd-row:hover .bd-row-go { color: var(--orange); }

    .bd-cta {
      display: inline-flex; align-items: center; gap: 12px;
      background: var(--orange); color: var(--black);
      font-family: 'Archivo Black', sans-serif; text-transform: uppercase; letter-spacing: -0.03em;
      font-size: 16px; padding: 16px 30px; border-radius: 9999px; text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .bd-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(255,77,0,0.3); }
    .bd-note {
      margin-top: 18px; padding: 14px 16px; border-left: 3px solid var(--orange);
      background: rgba(255,255,255,0.03); font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.7);
    }
    .bd-video { position: relative; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; border: 1px solid var(--line); }

    /* conteúdo sendo gerado */
    .bd-soon { text-align: center; padding: 56px 24px; border: 1px dashed rgba(255,255,255,0.18); border-radius: 18px; background: rgba(255,255,255,0.02); }
    .bd-soon-icon {
      width: 66px; height: 66px; margin: 0 auto 20px; border-radius: 50%;
      background: rgba(255,77,0,0.12); color: var(--orange);
      display: flex; align-items: center; justify-content: center;
    }
    .bd-soon-icon svg { animation: spin 2.6s linear infinite; }
    .bd-soon-title { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; letter-spacing: -0.03em; font-size: 22px; margin-bottom: 10px; }
    .bd-soon-text { font-size: 15px; line-height: 1.7; color: var(--muted); max-width: 420px; margin: 0 auto; }
    .bd-soon-dots::after { content: ''; animation: bdDots 1.5s steps(1, end) infinite; }
    @keyframes bdDots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }

    .bonus-pill.pending { color: var(--muted); border-color: var(--line); }

    /* ── OFERTAS (cards no dashboard) ────────────────────── */
    .offers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .offer-card {
      text-align: left; cursor: pointer; position: relative; overflow: hidden;
      background: var(--orange); color: var(--black);
      border: 2px solid var(--black); border-radius: 16px; padding: 22px 22px 18px;
      display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s;
    }
    .offer-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.35); }
    .offer-badge {
      align-self: flex-start; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 9px;
      text-transform: uppercase; letter-spacing: 0.04em; color: var(--orange); background: var(--black);
      padding: 4px 11px; border-radius: 9999px; margin-bottom: 14px;
    }
    .offer-title { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; letter-spacing: -0.03em; font-size: 21px; line-height: 1; margin-bottom: 8px; }
    .offer-desc { font-size: 13.5px; line-height: 1.5; color: rgba(0,0,0,0.7); margin-bottom: 18px; flex: 1; }
    .offer-foot { display: flex; align-items: center; justify-content: space-between; }
    .offer-price { font-family: 'Archivo Black', sans-serif; font-size: 22px; letter-spacing: -0.03em; }
    .offer-old { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; text-decoration: line-through; color: rgba(0,0,0,0.45); margin-right: 4px; }
    .offer-lock, .offer-access {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Space Mono', monospace; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: -0.02em;
      background: var(--black); color: var(--orange); padding: 7px 12px; border-radius: 9999px;
    }

    /* ── TELA DE COMPRA / DESBLOQUEIO ────────────────────── */
    .buygate { background: var(--black); border: 1px solid var(--line); border-radius: 18px; padding: 30px; text-align: center; }
    .buygate-price { display: flex; align-items: baseline; justify-content: center; gap: 12px; margin-bottom: 6px; }
    .buygate-old { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 16px; text-decoration: line-through; color: var(--muted); }
    .buygate-now { font-family: 'Archivo Black', sans-serif; font-size: 44px; letter-spacing: -0.04em; color: var(--orange); }
    .buygate-list { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
    .buygate-code { margin-top: 26px; padding-top: 22px; border-top: 1px solid var(--line); }
    .buygate-code-label { display: block; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.02em; color: var(--muted); margin-bottom: 12px; }
    .buygate-code-row { display: flex; gap: 10px; max-width: 380px; margin: 0 auto; }
    .buygate-code-row input {
      flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 14px; color: var(--white); font-size: 14px; font-family: 'Inter', sans-serif; text-align: center; text-transform: uppercase;
    }
    .buygate-code-row input:focus { outline: none; border-color: var(--orange); }
    .buygate-err { display: block; color: #ff6b4a; font-size: 12px; margin-top: 10px; min-height: 14px; }

    /* ── LISTA MÚSICA + PASSOS ───────────────────────────── */
    .song-list { display: flex; flex-direction: column; gap: 10px; }
    .song-row { background: var(--black); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; transition: border-color 0.2s; }
    .song-row:hover { border-color: rgba(255,77,0,0.4); }
    .song-top { display: flex; align-items: center; gap: 14px; }
    .song-num { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 12px; color: var(--orange); min-width: 22px; }
    .song-main { flex: 1; min-width: 0; text-decoration: none; }
    .song-title { display: block; font-size: 15px; font-weight: 600; color: var(--white); }
    .song-main:hover .song-title { color: var(--orange); }
    .song-sub { display: block; font-size: 12.5px; color: var(--muted); margin-top: 1px; }
    .song-feel { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 9px; text-transform: uppercase; letter-spacing: 0.02em; padding: 4px 10px; border-radius: 9999px; flex-shrink: 0; }
    .feel-lento { background: rgba(58,134,255,0.15); color: #6ea8ff; }
    .feel-médio { background: rgba(255,210,63,0.15); color: #ffd23f; }
    .feel-acelerado { background: rgba(247,37,133,0.15); color: #ff5fa2; }
    .song-steps { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding-left: 36px; }
    .step-tag {
      font-family: 'Space Mono', monospace; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: -0.02em;
      color: var(--orange); background: rgba(255,77,0,0.1); border: 1px solid rgba(255,77,0,0.3);
      padding: 5px 11px; border-radius: 9999px; cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .step-tag:hover { background: var(--orange); color: var(--black); }
    .step-tag.static { color: var(--muted); background: rgba(255,255,255,0.04); border-color: var(--line); cursor: default; }

    /* ═══════════════════════════════════════════════════════
       LESSON PLAYER VIEW
    ═══════════════════════════════════════════════════════ */
    .player-top { padding: 26px 0 22px; }

  const TOTAL_LESSONS = COURSE.reduce((n, m) => n + m.lessons.length, 0);
  const FLAT = COURSE.flatMap((m, mi) => m.lessons.map((l, li) => ({ ...l, mIndex: mi, lIndex: li, module: m })));

  const LS_DONE = 'enf_done';
  const LS_LAST = 'enf_last';
  const LS_CHECK = 'enf_check';

  const LS_UNLOCK = 'enf_unlocked';

  let done = new Set(JSON.parse(localStorage.getItem(LS_DONE) || '[]'));
  let bchecks = new Set(JSON.parse(localStorage.getItem(LS_CHECK) || '[]'));
  let unlocked = new Set(JSON.parse(localStorage.getItem(LS_UNLOCK) || '[]'));

  const saveDone = () => localStorage.setItem(LS_DONE, JSON.stringify([...done]));
  const saveChecks = () => localStorage.setItem(LS_CHECK, JSON.stringify([...bchecks]));
  const saveUnlock = () => localStorage.setItem(LS_UNLOCK, JSON.stringify([...unlocked]));
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  function enterApp() {
    $('greeting').textContent = saudacao() + '! Bora dançar?';
    $('statTotal').textContent = '/' + TOTAL_LESSONS;
    $('statModules').textContent = String(COURSE.length).padStart(2, '0');
    $('modulesCount').textContent = `${String(COURSE.length).padStart(2,'0')} módulos · ${TOTAL_LESSONS} aulas`;
    renderDashboard();
    showView('dash');
  }

  function saudacao() {
    const h = new Date().getHours();
    if (h < 12) return 'Bom dia';
    if (h < 18) return 'Boa tarde';
    return 'Boa noite';
  }

  function renderDashboard() {
    updateProgress();
    renderContinue();
    renderModules();
    renderBonuses();
    renderOffers();
  }

  function updateProgress() {
    const n = done.size;
    const pct = Math.round((n / TOTAL_LESSONS) * 100);
    $('statDone').textContent = n;
    $('statPct').textContent = pct;
    $('topProgressFill').style.width = pct + '%';
    $('topProgressLabel').textContent = pct + '%';
  }

  function nextLessonToWatch() {
    const lastId = localStorage.getItem(LS_LAST);
    const notDone = FLAT.find((l) => !done.has(l.id));
    if (lastId) {
      const last = FLAT.find((l) => l.id === lastId);
      if (last && !done.has(last.id)) return last;
    }
    return notDone || FLAT[0];
  }

  function renderContinue() {
    const allDone = done.size === TOTAL_LESSONS;
    const l = nextLessonToWatch();
    const card = $('continueCard');
    if (allDone) {
      card.innerHTML = `
        <img class="continue-img" src="assets/mod6.png" alt="" />
        <div class="continue-body">

          </button>
        </div>`;
    }
    card.querySelector('[data-go]').addEventListener('click', (e) => openLesson(e.currentTarget.dataset.go));
  }

  function moduleProgress(m) {
    const total = m.lessons.length;
    const n = m.lessons.filter((l) => done.has(l.id)).length;
    return { n, total, pct: Math.round((n / total) * 100) };
  }

  function renderModules() {
    const grid = $('moduleGrid');
    grid.innerHTML = '';
    COURSE.forEach((m, i) => {

      el.className = 'module-card' + (p.pct === 100 ? ' complete' : '');
      el.innerHTML = `

      grid.appendChild(el);

          renderOfferDetail(o);
        } else {
          $('unlockErr').textContent = 'Código inválido. Confira o e-mail da compra.';
        }
      };
      $('unlockBtn').addEventListener('click', tryUnlock);
      $('unlockInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
      return;
    }

    // conteúdo liberado
    if (o.type === 'playsteps') {
      const rows = o.songs.map((s, i) => {
        const q = encodeURIComponent(`${s.a} ${s.t}`);
        const steps = s.steps.map((name) => {
          const lid = lessonIdByName(name);
          return lid
            ? `<button class="step-tag" data-lesson="${lid}">${esc(name)}</button>`
            : `<span class="step-tag static">${esc(name)}</span>`;
        }).join('');
        return `<div class="song-row">
          <div class="song-top">
            <span class="song-num">${String(i + 1).padStart(2, '0')}</span>
            <a class="song-main" href="https://www.youtube.com/results?search_query=${q}" target="_blank" rel="noopener">
              <span class="song-title">${esc(s.t)}</span>
              <span class="song-sub">${esc(s.a)}</span>
            </a>
            <span class="song-feel feel-${s.feel.toLowerCase()}">${esc(s.feel)}</span>
          </div>
          <div class="song-steps">${steps}</div>
        </div>`;
      }).join('');
      wrap.innerHTML = `
        <div class="bd-head">
          <div class="bd-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
          <div><div class="bd-tag">Oferta · ${esc(o.tag)}</div><h1 class="bd-title">${esc(o.title)}</h1></div>
        </div>
        <p class="bd-intro">${esc(o.intro)}</p>
        <div class="song-list">${rows}</div>`;
      wrap.querySelectorAll('.step-tag[data-lesson]').forEach((b) => {
        b.addEventListener('click', () => openLesson(b.dataset.lesson));
      });
    }

    else if (o.type === 'guide') {
      const sections = o.sections.map((s) => `
        <div class="bd-section">
          <h3>${esc(s.h)}</h3>
          <ul class="bd-list">
            ${s.items.map((it) => `<li><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span>${esc(it)}</span></li>`).join('')}
          </ul>
        </div>`).join('');
      wrap.innerHTML = `
        <div class="bd-head">
          <div class="bd-icon">${BONUS_ICON.guide}</div>
          <div><div class="bd-tag">Oferta · ${esc(o.tag)}</div><h1 class="bd-title">${esc(o.title)}</h1></div>
        </div>
        <p class="bd-intro">${esc(o.intro)}</p>
        ${sections}
        ${o.note ? `<div class="bd-note">${esc(o.note)}</div>` : ''}`;
    }
  }

  const isBonusPending = (b) => (b.type === 'link' && !b.url) || (b.type === 'video' && !b.yt);

  function bonusSoonHTML() {
    return `<div class="bd-soon">
      <div class="bd-soon-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      </div>
      <div class="bd-soon-title">Conteúdo sendo gerado</div>
      <p class="bd-soon-text">Estamos preparando este bônus pra você<span class="bd-soon-dots"></span><br/>Em breve ele aparece aqui na sua área de membros.</p>
    </div>`;
  }

  function openBonus(id) {
    const b = BONUSES.find((x) => x.id === id);
    if (!b) return;
    renderBonusDetail(b);
    showView('bonus');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderBonusDetail(b) {
    const wrap = $('bonusDetail');
    let body = '';

    if (b.type === 'guide') {
      body = b.sections.map((s) => `
        <div class="bd-section">
          <h3>${esc(s.h)}</h3>
          <ul class="bd-list">
            ${s.items.map((it) => `<li><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span>${esc(it)}</span></li>`).join('')}
          </ul>
        </div>`).join('');
    }

    else if (b.type === 'playlist') {
      body = `<div class="bd-rows">${b.songs.map(([artist, title], i) => {
        const q = encodeURIComponent(`${artist} ${title}`);
        return `<a class="bd-row" href="https://www.youtube.com/results?search_query=${q}" target="_blank" rel="noopener">
          <span class="bd-row-num">${String(i + 1).padStart(2, '0')}</span>
          <span class="bd-row-main"><span class="bd-row-title">${esc(title)}</span><span class="bd-row-sub">${esc(artist)}</span></span>
          <span class="bd-row-go"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg></span>
        </a>`;
      }).join('')}</div>`;
    }

    else if (b.type === 'agenda') {
      body = `<div class="bd-rows">${b.links.map(([name, sub, url]) => `
        <a class="bd-row" href="${url}" target="_blank" rel="noopener">
          <span class="bd-row-main"><span class="bd-row-title">${esc(name)}</span><span class="bd-row-sub">${esc(sub)}</span></span>
          <span class="bd-row-go"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg></span>
        </a>`).join('')}</div>
        ${b.tip ? `<div class="bd-note">${esc(b.tip)}</div>` : ''}`;
    }

    else if (b.type === 'checklist') {
      body = `<ul class="bd-check" id="bdCheck">${b.items.map((it, i) => {
        const key = b.id + ':' + i, on = bchecks.has(key);
        return `<li data-key="${key}" class="${on ? 'on' : ''}">
          <span class="ck"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
          <span>${esc(it)}</span>
        </li>`;
      }).join('')}</ul>`;
    }

    else if (b.type === 'link') {
      body = b.url
        ? `<a class="bd-cta" href="${b.url}" target="_blank" rel="noopener">${esc(b.cta)}
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a>`
        : bonusSoonHTML();
    }

    else if (b.type === 'video') {
      body = b.yt
        ? `<div class="bd-video" id="bdVideo"></div>`
        : bonusSoonHTML();
    }

    wrap.innerHTML = `
      <div class="bd-head">
        <div class="bd-icon">${BONUS_ICON[b.type] || BONUS_ICON.guide}</div>
        <div>
          <div class="bd-tag">Bônus · ${esc(b.tag)}</div>
          <h1 class="bd-title">${esc(b.title)}</h1>
        </div>
      </div>
      <p class="bd-intro">${esc(b.intro)}</p>
      ${body}`;

    if (b.type === 'checklist') {
      wrap.querySelectorAll('#bdCheck li').forEach((li) => {
        li.addEventListener('click', () => {
          const k = li.dataset.key;
          if (bchecks.has(k)) { bchecks.delete(k); li.classList.remove('on'); }
          else { bchecks.add(k); li.classList.add('on'); }
          saveChecks();
        });
      });
    }
    if (b.type === 'video' && b.yt) {
      buildNativePlayer({ id: 'bonus-' + b.id, yt: b.yt, name: b.title, thumb: 'assets/mod4.png' }, $('bdVideo'));
    }
  }

  /* ════════════════════════════════════════════════════════
     PLAYER
  ════════════════════════════════════════════════════════ */
  let currentId = null;

  function openLesson(id, scrollTop) {
    currentId = id;
    localStorage.setItem(LS_LAST, id);
    renderPlayer();
    showView('player');
    if (scrollTop !== false) window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderVideoStage(l) {
    const stage = $('playerVideo');
    if (l.yt) {
      buildNativePlayer(l, stage);
      return;
    } else if (l.video) {
      const src = l.video.split('/').map(encodeURIComponent).join('/');
      const poster = encodeURI(l.thumb);
      stage.innerHTML = `<video controls playsinline preload="metadata" poster="${poster}"
        style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;opacity:1;z-index:3;">
        <source src="${src}" type="video/mp4" />
        Seu navegador não suporta vídeo HTML5.
      </video>`;
    } else {
      stage.innerHTML = `
        <img src="${encodeURI(l.thumb)}" alt="${l.name}" />
        <div class="player-video-overlay">
          <div class="player-play">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>
          </div>
          <div class="player-video-note">Vídeo desta aula em breve</div>
        </div>`;
    }
  }

  /* ── Player nativo sobre o YouTube (UI própria) ── */
  const NP_ICON = {
    play:  '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>',
    pause: '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>',
    vol:   '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 6a8 8 0 0 1 0 12"/></svg>',
    mute:  '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>',
    fs:    '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M21 16v3a2 2 0 0 1-2 2h-3"/></svg>',
  };
  const NP_RATES = [1, 1.25, 1.5, 2];
  let np = { player: null, lesson: null, tick: null, barTimer: null, rateIdx: 0, pending: null };

  function ytAPIReady() {
    return new Promise((res) => {
      if (window.YT && window.YT.Player) return res();
      (window.__ytCbs = window.__ytCbs || []).push(res);
      if (!window.__ytLoading) {
        window.__ytLoading = true;
        const prev = window.onYouTubeIframeAPIReady;
        window.onYouTubeIframeAPIReady = () => { prev && prev(); (window.__ytCbs || []).forEach((f) => f()); window.__ytCbs = []; };
        const s = document.createElement('script');
        s.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(s);
      }
    });
  }

  function npFmt(t) {
    t = Math.max(0, Math.floor(t || 0));
    const m = Math.floor(t / 60), s = t % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  function destroyNP() {
    if (np.tick) { clearInterval(np.tick); np.tick = null; }
    if (np.barTimer) { clearTimeout(np.barTimer); np.barTimer = null; }
    if (np.player && np.player.destroy) { try { np.player.destroy(); } catch (e) {} }
    np.player = null; np.lesson = null; np.pending = null;
  }

  async function buildNativePlayer(l, stage) {
    destroyNP();
    np.rateIdx = 0;
    np.pending = l.id;
    stage.innerHTML = `
      <div class="np loading" id="np">
        <div class="np-frame"><div id="ytmount"></div></div>
        <div class="np-poster" style="background-image:url('${encodeURI(l.thumb)}')"></div>
        <div class="np-click" id="npClick"></div>
        <div class="np-spinner"></div>
        <button class="np-center" id="npCenter" aria-label="Reproduzir">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>
        </button>
        <div class="np-bar" id="npBar">
          <button class="np-btn" id="npPlay" aria-label="Play/Pause">${NP_ICON.play}</button>
          <span class="np-time" id="npTime">0:00 / 0:00</span>
          <input class="np-seek" id="npSeek" type="range" min="0" max="1000" value="0" aria-label="Progresso" />
          <button class="np-rate" id="npRate" aria-label="Velocidade">1x</button>
          <button class="np-btn" id="npMute" aria-label="Volume">${NP_ICON.vol}</button>
          <button class="np-btn" id="npFs" aria-label="Tela cheia">${NP_ICON.fs}</button>
        </div>
      </div>`;

    await ytAPIReady();
    if (np.pending !== l.id) return; // usuário trocou de aula/bônus durante o carregamento
    np.lesson = l;
    np.player = new YT.Player('ytmount', {
      videoId: l.yt,
      playerVars: { controls: 0, modestbranding: 1, rel: 0, iv_load_policy: 3, disablekb: 1, playsinline: 1, fs: 0, origin: location.origin },
      events: { onReady: onNPReady, onStateChange: onNPState },
    });
    wireNP();
  }

  function onNPReady() {
    const el = document.getElementById('np');
    if (el) el.classList.remove('loading');
    npUpdateTime();
  }

  function onNPState(e) {
    const el = document.getElementById('np');
    if (!el || !window.YT) return;
    const S = YT.PlayerState;
    if (e.data === S.PLAYING) {
      el.classList.add('playing', 'started'); el.classList.remove('loading');
      setPlayIcon(true); npStartTick(); npArmHideBar();
    } else if (e.data === S.PAUSED) {
      el.classList.remove('playing'); setPlayIcon(false); npShowBar(); npStopTick();
    } else if (e.data === S.BUFFERING) {
      el.classList.add('loading');
    } else if (e.data === S.ENDED) {
      el.classList.remove('playing', 'loading'); setPlayIcon(false); npShowBar(); npStopTick();
      const l = np.lesson;
      if (l && FLAT.some((f) => f.id === l.id) && !done.has(l.id)) toggleDone(l.id); // só aulas reais: marca concluída + avança
    }
    if (e.data !== S.BUFFERING) el.classList.remove('loading');
  }

  function setPlayIcon(playing) {
    const b = document.getElementById('npPlay');
    if (b) b.innerHTML = playing ? NP_ICON.pause : NP_ICON.play;
  }

  function npStartTick() { npStopTick(); np.tick = setInterval(npUpdateTime, 250); }
  function npStopTick() { if (np.tick) { clearInterval(np.tick); np.tick = null; } }

  function npUpdateTime() {
    const p = np.player; if (!p || !p.getDuration) return;
    const d = p.getDuration() || 0, c = p.getCurrentTime() || 0;
    const t = document.getElementById('npTime'); if (t) t.textContent = npFmt(c) + ' / ' + npFmt(d);
    const seek = document.getElementById('npSeek');
    if (seek && !seek.dataset.drag) {
      const v = d ? Math.round((c / d) * 1000) : 0;
      seek.value = v;
      seek.style.background = `linear-gradient(to right, var(--orange) ${v / 10}%, rgba(255,255,255,0.25) ${v / 10}%)`;
    }
  }

  function npShowBar() { const el = document.getElementById('np'); if (el) el.classList.remove('hidebar'); }
  function npArmHideBar() {
    if (np.barTimer) clearTimeout(np.barTimer);
    np.barTimer = setTimeout(() => { const el = document.getElementById('np'); if (el && el.classList.contains('playing')) el.classList.add('hidebar'); }, 2600);
  }

  function wireNP() {
    const el = document.getElementById('np');
    const toggle = () => {
      const p = np.player; if (!p || !p.getPlayerState) return;
      if (p.getPlayerState() === YT.PlayerState.PLAYING) p.pauseVideo(); else p.playVideo();
    };
    document.getElementById('npClick').onclick = toggle;
    document.getElementById('npCenter').onclick = toggle;
    document.getElementById('npPlay').onclick = toggle;

    const seek = document.getElementById('npSeek');
    seek.addEventListener('input', () => {
      seek.dataset.drag = '1';
      const d = (np.player && np.player.getDuration()) || 0, t = d * (seek.value / 1000);
      const tl = document.getElementById('npTime'); if (tl) tl.textContent = npFmt(t) + ' / ' + npFmt(d);
      seek.style.background = `linear-gradient(to right, var(--orange) ${seek.value / 10}%, rgba(255,255,255,0.25) ${seek.value / 10}%)`;
    });
    seek.addEventListener('change', () => {
      const d = (np.player && np.player.getDuration()) || 0;
      if (np.player) np.player.seekTo(d * (seek.value / 1000), true);
      delete seek.dataset.drag;
    });

    const rate = document.getElementById('npRate');
    rate.onclick = () => {
      np.rateIdx = (np.rateIdx + 1) % NP_RATES.length;
      if (np.player) np.player.setPlaybackRate(NP_RATES[np.rateIdx]);
      rate.textContent = NP_RATES[np.rateIdx] + 'x';
    };

    const mute = document.getElementById('npMute');
    mute.onclick = () => {
      const p = np.player; if (!p) return;
      if (p.isMuted()) { p.unMute(); mute.innerHTML = NP_ICON.vol; } else { p.mute(); mute.innerHTML = NP_ICON.mute; }
    };

    document.getElementById('npFs').onclick = () => {
      if (document.fullscreenElement) document.exitFullscreen();
      else if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    };

    el.addEventListener('mousemove', () => { npShowBar(); npArmHideBar(); });
  }

  function renderPlayer() {
    const idx = FLAT.findIndex((l) => l.id === currentId);
    const l = FLAT[idx];
    const m = l.module;

    renderVideoStage(l);
    $('playerEyebrow').textContent = `Módulo ${String(l.mIndex + 1).padStart(2,'0')} · ${m.title} — Aula ${l.lIndex + 1}`;
    $('playerTitle').textContent = l.name;
    $('playerDesc').textContent = l.desc;

    // complete button
    const isDone = done.has(l.id);
    const cb = $('completeBtn');
    cb.className = 'btn-complete' + (isDone ? ' done' : '');
    cb.innerHTML = isDone
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Aula concluída'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Marcar como concluída';
    cb.onclick = () => toggleDone(l.id);

    // prev / next (global flow)
    const prev = FLAT[idx - 1], next = FLAT[idx + 1];
    $('prevBtn').disabled = !prev;
    $('nextBtn').disabled = !next;
    $('prevBtn').onclick = () => prev && openLesson(prev.id);
    $('nextBtn').onclick = () => next && openLesson(next.id);

    // playlist (this module)
    $('plModule').textContent = `Módulo ${String(l.mIndex + 1).padStart(2,'0')}`;
    $('plTitle').textContent = m.title;
    const mp = moduleProgress(m);
    $('plBarFill').style.width = mp.pct + '%';

    const wrap = $('plItems');
    wrap.innerHTML = '';
    m.lessons.forEach((ls, i) => {
      const active = ls.id === currentId;
      const complete = done.has(ls.id);
      const item = document.createElement('button');
      item.className = 'playlist-item' + (active ? ' active' : '') + (complete ? ' complete' : '');
      item.innerHTML = `
        <span class="pl-check">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </span>
        <span class="pl-meta">
          <span class="pl-num">Aula ${i + 1}</span>
          <span class="pl-name">${ls.name}</span>
        </span>
        <span class="pl-playing">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>
        </span>`;
      item.addEventListener('click', () => openLesson(ls.id));
      wrap.appendChild(item);
    });
  }

  function toggleDone(id) {
    if (done.has(id)) {
      done.delete(id);
    } else {
      done.add(id);
      const idx = FLAT.findIndex((l) => l.id === id);
      const next = FLAT[idx + 1];
      if (done.size === TOTAL_LESSONS) {
        toast('🎉 Curso concluído! Bora pro arraiá!');
      } else {
        toast('✓ Aula concluída!');
        // auto-advance after a beat
        if (next) setTimeout(() => { if (currentId === id) openLesson(next.id); }, 700);
      }
    }
    saveDone();
    updateProgress();
    renderPlayer();
  }

  /* ════════════════════════════════════════════════════════
     NAV / UTIL
  ════════════════════════════════════════════════════════ */
  function showView(name) {
    if (name === 'dash') destroyNP(); // para o vídeo/áudio ao voltar ao painel
    document.querySelectorAll('.view').forEach((v) => v.classList.remove('active'));
    $(name + 'View').classList.add('active');
    if (name === 'dash') renderDashboard();
  }

  $('backBtn').addEventListener('click', () => { showView('dash'); window.scrollTo({ top: 0, behavior: 'smooth' }); });
  $('bonusBack').addEventListener('click', () => { showView('dash'); window.scrollTo({ top: 0, behavior: 'smooth' }); });
  $('homeLogo').addEventListener('click', () => { showView('dash'); window.scrollTo({ top: 0, behavior: 'smooth' }); });

  let toastTimer;
  function toast(msg) {
    const t = $('toast');
    t.innerHTML = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
  }

  /* ── BANDEIRINHAS render ── */
  document.querySelectorAll('.bunting').forEach((b) => {
    b.innerHTML = Array.from({ length: 40 }, () => '<i></i>').join('');
  });

  /* ════════════════════════════════════════════════════════
     BOOT
  ════════════════════════════════════════════════════════ */
  enterApp();
  </script>
</body>
</html>
